name: Publish @oqtopus-team/qdash-client

on:
  pull_request:
    branches: [develop]
    paths:
      - "clients/typescript/**"
      - "docs/oas/openapi.json"
      - "Taskfile.yaml"
      - ".github/workflows/publish-qdash-typescript-client.yml"
  push:
    tags:
      - "qdash-client-ts-v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build TypeScript client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: clients/typescript
        run: bun install --frozen-lockfile

      - name: Verify generated client
        working-directory: clients/typescript
        run: |
          bun run generate
          git diff --exit-code -- src/generated

      - name: Run checks
        working-directory: clients/typescript
        run: bun run check

      - name: Set release version
        if: startsWith(github.ref, 'refs/tags/qdash-client-ts-v')
        working-directory: clients/typescript
        run: npm version "${GITHUB_REF_NAME#qdash-client-ts-v}" --no-git-tag-version

      - name: Build package
        working-directory: clients/typescript
        run: |
          bun run build
          npm pack --pack-destination dist --ignore-scripts

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: qdash-typescript-client-dist
          path: clients/typescript/dist/oqtopus-team-qdash-client-*.tgz
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/qdash-client-ts-v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install --global npm@latest

      - name: Download package artifact
        uses: actions/download-artifact@v6
        with:
          name: qdash-typescript-client-dist
          path: dist

      - name: Publish package
        run: npm publish ./dist/oqtopus-team-qdash-client-*.tgz --access public --provenance
        env:
          # Used only to bootstrap the package before npm Trusted Publishing can be configured.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
