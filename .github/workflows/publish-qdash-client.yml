name: Publish qdash-client

on:
  pull_request:
    branches: [develop]
    paths:
      - "src/qdash/client/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/publish-qdash-client.yml"
  push:
    tags:
      - "qdash-client-v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build qdash-client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Build package
        run: uv build --package qdash-client --out-dir dist

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: qdash-client-dist
          path: dist/qdash_client-*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/qdash-client-v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v6
        with:
          name: qdash-client-dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
