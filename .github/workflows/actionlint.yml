name: GitHub Actions Lint

on:
  push:
    branches: [main, develop]
    paths:
      - ".github/workflows/**"
  pull_request:
    branches: [main, develop]
    paths:
      - ".github/workflows/**"

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check
          fail_level: error
