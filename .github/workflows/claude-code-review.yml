name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: >
      github.event.pull_request.head.ref != 'develop' &&
      github.event.pull_request.head.ref != 'main' &&
      !startsWith(github.event.pull_request.head.ref, 'dependabot/') &&
      !startsWith(github.event.pull_request.head.ref, 'renovate/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request with a focus on:
            - Bugs, behavioral regressions, and edge cases
            - Missing or weak tests for the changed behavior
            - Security, data handling, and permission risks
            - Consistency with existing QDash patterns and conventions

            Post findings as GitHub PR comments. Use inline comments for specific
            code issues and a concise top-level comment when no blocking issues are found.
          claude_args: |
            --max-turns 10
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git show:*),Bash(git status:*)"

      - name: Report Claude Code Review failure
        if: steps.claude-review.outcome == 'failure'
        run: echo "::warning::Claude Code Review failed before posting a review. Treating it as best-effort so PR checks are not blocked. See the claude-review step logs for details."
