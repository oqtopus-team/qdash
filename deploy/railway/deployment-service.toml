[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/railway/Dockerfile.deployment-service"
watchPatterns = [
  "pyproject.toml",
  "uv.lock",
  "src/qdash/analysis/**",
  "src/qdash/common/**",
  "src/qdash/config.py",
  "src/qdash/datamodel/**",
  "src/qdash/dbmodel/**",
  "src/qdash/repository/**",
  "src/qdash/workflow/**",
  "deploy/railway/Dockerfile.deployment-service",
  "config/**",
]

[deploy]
startCommand = "sh -c 'uvicorn qdash.workflow.deployment_service:app --host 0.0.0.0 --port ${PORT:-8001}'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
