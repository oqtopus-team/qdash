[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/railway/Dockerfile.api"
watchPatterns = [
  "pyproject.toml",
  "uv.lock",
  "src/qdash/api/**",
  "src/qdash/analysis/**",
  "src/qdash/common/**",
  "src/qdash/config.py",
  "src/qdash/datamodel/**",
  "src/qdash/dbmodel/**",
  "src/qdash/repository/**",
  "src/qdash/workflow/calibtasks/**",
  "src/qdash/workflow/service/**",
  "src/qdash/workflow/templates/**",
  "src/qdash/workflow/user_flows/**",
  "deploy/railway/Dockerfile.api",
  "config/**",
]

[deploy]
startCommand = "sh -c 'gunicorn qdash.api.main:app --workers ${WEB_CONCURRENCY:-2} --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:${PORT:-5715}'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
