[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/railway/Dockerfile.user-flow-worker"
watchPatterns = [
  "pyproject.toml",
  "uv.lock",
  "src/qdash/analysis/**",
  "src/qdash/common/**",
  "src/qdash/config.py",
  "src/qdash/datamodel/**",
  "src/qdash/dbmodel/**",
  "src/qdash/repository/**",
  "src/qdash/workflow/**",
  "deploy/railway/Dockerfile.user-flow-worker",
  "config/**",
]

[deploy]
startCommand = "python start_worker.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
