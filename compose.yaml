name: ${COMPOSE_PROJECT_NAME:-${ENV:-default}}
services:
  mongo:
    image: mongo
    restart: always
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INIT_DATABASE: qubex
    volumes:
      - ${MONGO_DATA_PATH:-./mongo_data/data/db}:/data/db
    networks:
      - custom_net
  mongo-express:
    image: mongo-express
    restart: always
    env_file:
      - .env
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongo
    networks:
      - custom_net
  postgres:
    image: postgres:14
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DATA_PATH:-./postgres_data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - custom_net
  prefect-server:
    image: prefecthq/prefect:3-python3.11
    restart: always
    env_file:
      - .env
    entrypoint: ["/bin/bash", "-c"]
    command: ["prefect server start --host 0.0.0.0"]
    environment:
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - custom_net
  deployment-service:
    build:
      context: .
      dockerfile: ./src/qdash/workflow/Dockerfile.deployment
    restart: always
    env_file:
      - .env
    depends_on:
      - prefect-server
    volumes:
      - ./src/qdash/workflow:/app/qdash/workflow
      - ./src/qdash/analysis:/app/qdash/analysis # Shared spectroscopy analysis (also used by api)
      - ./src/qdash/copilot:/app/qdash/copilot
      - ./src/qdash/dbmodel:/app/qdash/dbmodel
      - ./src/qdash/datamodel:/app/qdash/datamodel
      - ./src/qdash/common:/app/qdash/common
      - ./src/qdash/repository:/app/qdash/repository
      - ./src/qdash/config.py:/app/qdash/config.py
      - ./config:/app/config
      - ./logs/deployment:/app/logs
    working_dir: /app/qdash/workflow
    command: uvicorn deployment_service:app --host 0.0.0.0 --port 8001 --reload
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PYTHONPATH=/app:/app/qdash/workflow:/app/qdash/dbmodel:/app/qdash
      - DEFAULT_BACKEND=${DEFAULT_BACKEND:-qubex}
    networks:
      - custom_net
  user-flow-worker:
    build:
      context: .
      dockerfile: ./src/qdash/workflow/Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      - prefect-server
      - deployment-service
    volumes:
      - ./src/qdash/workflow:/app/qdash/workflow
      - ./src/qdash/analysis:/app/qdash/analysis # Shared spectroscopy analysis
      - ./src/qdash/copilot:/app/qdash/copilot
      - ./src/qdash/dbmodel:/app/qdash/dbmodel
      - ./src/qdash/datamodel:/app/qdash/datamodel
      - ./src/qdash/common:/app/qdash/common
      - ./src/qdash/repository:/app/qdash/repository
      - ./src/qdash/config.py:/app/qdash/config.py
      - ${CALIB_DATA_PATH:-./calib_data}:/app/calib_data
      - ${CONFIG_PATH:-./config/qubex-config}:/app/config/qubex-config # Qubex backend configuration repository/data
      - ./config:/app/config # QDash app/domain/copilot config files
      - ./logs/worker:/app/logs
    working_dir: /app/qdash/workflow
    command: python start_worker.py
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PREFECT_LOGGING_SETTINGS_PATH=/app/config/app/logging/prefect.yaml
      - PYTHONPATH=/app:/app/qdash:/app/qdash/workflow:/app/qdash/dbmodel
      - DEFAULT_BACKEND=${DEFAULT_BACKEND:-qubex}
    networks:
      - custom_net
  api:
    build:
      context: .
      dockerfile: ./src/qdash/api/Dockerfile
    restart: always
    privileged: true
    env_file:
      - .env
    volumes:
      - ./src/qdash/api:/app/qdash/api
      - ./src/qdash/analysis:/app/qdash/analysis # Shared spectroscopy analysis (used by reanalysis service)
      - ./src/qdash/copilot:/app/qdash/copilot
      - ./src/qdash/dbmodel:/app/qdash/dbmodel
      - ./src/qdash/datamodel:/app/qdash/datamodel
      - ./src/qdash/common:/app/qdash/common
      - ./src/qdash/repository:/app/qdash/repository
      - ./src/qdash/config.py:/app/qdash/config.py
      - ./src/qdash/workflow/user_flows:/app/qdash/workflow/user_flows # Shared user flows
      - ./src/qdash/workflow/templates:/app/qdash/workflow/templates # Flow templates
      - ./src/qdash/workflow/service:/app/qdash/workflow/service # Calibration service modules
      - ${CALIBTASKS_PATH:-./src/qdash/workflow/calibtasks}:/app/qdash/workflow/calibtasks # Calibration tasks
      - ./config:/app/config # QDash app/domain/copilot config files
      - ${CALIB_DATA_PATH:-./calib_data}:/app/calib_data
      - ${CONFIG_PATH:-./config/qubex-config}:/app/config/qubex-config # Qubex backend configuration repository/data
      - ./logs/api:/app/logs
    working_dir: /app/qdash/api
    command: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --reload --bind :${API_PORT:-5715} --log-level debug
    develop:
      watch:
        - action: sync
          path: ./src/qdash/api
          target: /app/api
    depends_on:
      - mongo
      - prefect-server
      - deployment-service
    environment:
      - PYTHONPATH=/app:/app/qdash:/app/qdash/api:/app/qdash/dbmodel:/app/qdash/datamodel:/app/qdash
      - CALIB_DATA_PATH=/app/calib_data
      - PREFECT_API_URL=http://prefect-server:4200/api
      - DEPLOYMENT_SERVICE_URL=http://deployment-service:8001
    networks:
      - custom_net
  ui:
    build:
      context: .
      dockerfile: ./ui/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_ENV: ${ENV}
        NEXT_PUBLIC_PREFECT_URL: ${NEXT_PUBLIC_PREFECT_URL}
        INTERNAL_API_URL: http://api:${API_PORT:-5715}
        NEXT_PUBLIC_COPILOT_ENABLED: ${NEXT_PUBLIC_COPILOT_ENABLED:-}
    restart: always
    env_file:
      - .env
    environment:
      - PORT=${UI_PORT:-5714}
    depends_on:
      - api
    networks:
      - custom_net
  reverse-proxy:
    image: caddy:2
    restart: always
    env_file:
      - .env
    environment:
      - QDASH_LOCAL_HOST=${QDASH_LOCAL_HOST}
      - QDASH_UI_UPSTREAM=${QDASH_UI_UPSTREAM}
      - QDASH_API_UPSTREAM=${QDASH_API_UPSTREAM}
    volumes:
      - ./config/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - custom_net
  tunnel:
    image: cloudflare/cloudflared
    restart: unless-stopped
    env_file:
      - .env
    command:
      - tunnel
      - --no-autoupdate
      - --no-chunked-encoding
      - run
    depends_on:
      - reverse-proxy
    networks:
      - custom_net
    profiles:
      - tunnel
networks:
  custom_net:
    external: false
