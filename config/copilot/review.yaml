# Copilot Review Configuration
# Settings for task result analysis, automatic AI review, and chip scoring.

# Specialized models for task result analysis (chevron patterns, Rabi, etc.).
analysis_models:
  - provider: ollama
    name: gemma4:26b
    # Ollama endpoint. Set OLLAMA_BASE_URL to your Ollama server URL,
    # e.g. http://localhost:11434. QDash appends /v1 automatically.
    base_url: env:OLLAMA_BASE_URL
    # Optional. If unset or missing, Ollama uses a dummy "ollama" API key.
    api_key_env: OLLAMA_API_KEY
    # Keep the local VLM resident between automatic review requests and avoid
    # repeated cold model loads between short qdash reviews.
    keep_alive: 30m
    # Gemma 4 best-practice sampling for stable local VLM review.
    temperature: 1.0
    top_p: 0.95
    top_k: 64
    reasoning_effort: none
    disable_thinking_instruction: true
    max_output_tokens: 4096
  - provider: ollama
    name: gemma4:31b
    # Higher-stability local VLM fallback. It is slower than 26B but showed
    # fewer format failures in qdash review spot checks.
    base_url: env:OLLAMA_BASE_URL
    api_key_env: OLLAMA_API_KEY
    keep_alive: 30m
    temperature: 1.0
    top_p: 0.95
    top_k: 64
    reasoning_effort: none
    disable_thinking_instruction: true
    max_output_tokens: 4096
  - provider: openai
    name: gpt-5.4
    temperature: 0.7
    max_output_tokens: 4096

# Metrics to include in multi-metric evaluation
# Only these metrics will be used for overall chip health scoring
# Keys must match the metric keys defined in metrics.yaml
evaluation_metrics:
  qubit:
    - qubit_frequency
    - anharmonicity
    - t1
    - t1_average
    - t2_echo
    - t2_echo_average
    - t2_star
    - average_readout_fidelity
    - x90_gate_fidelity
  coupling:
    - zx90_gate_fidelity
    - bell_state_fidelity

# Scoring thresholds for AI evaluation
# Values should be in the displayed scale (after applying metric scale from metrics.yaml)
# higher_is_better: true means higher values are better (e.g., T1, fidelity)
scoring:
  t1:
    good: 50
    excellent: 100
    bad: 20
    unit: μs
    higher_is_better: true
  t1_average:
    good: 50
    excellent: 100
    bad: 20
    unit: μs
    higher_is_better: true
  t2_echo:
    good: 80
    excellent: 150
    bad: 30
    unit: μs
    higher_is_better: true
  t2_echo_average:
    good: 80
    excellent: 150
    bad: 30
    unit: μs
    higher_is_better: true
  t2_star:
    good: 20
    excellent: 40
    bad: 10
    unit: μs
    higher_is_better: true
  average_readout_fidelity:
    good: 95
    excellent: 99
    bad: 85
    unit: "%"
    higher_is_better: true
  x90_gate_fidelity:
    good: 99.5
    excellent: 99.9
    bad: 98.0
    unit: "%"
    higher_is_better: true
  x180_gate_fidelity:
    good: 99.5
    excellent: 99.9
    bad: 98.0
    unit: "%"
    higher_is_better: true
  bare_frequency:
    good: 4.5
    excellent: 5.0
    unit: GHz
    higher_is_better: true
  anharmonicity:
    good: -280
    excellent: -320
    bad: -250
    unit: MHz
    higher_is_better: false
  zx90_gate_fidelity:
    good: 95
    excellent: 99
    bad: 85
    unit: "%"
    higher_is_better: true
  bell_state_fidelity:
    good: 90
    excellent: 95
    bad: 80
    unit: "%"
    higher_is_better: true

# Task analysis configuration (side-panel chat in metrics modal)
analysis:
  enabled: true
  # Whether to send result figures to the LLM (requires multimodal model)
  multimodal: true
  # Reference images to send during task analysis and automatic AI review.
  max_expected_images: 2
  # Automatic AI review prioritizes review quality by default and inherits the
  # same reference-image and output-token settings as task analysis. Set these
  # optional overrides only when a lower-latency review mode is required.
  ai_review_max_expected_images: null
  ai_review_max_output_tokens: null
  # Terminal task results whose notes should receive automatic AI review. Both
  # completed and failed results are eligible; running, pending, scheduled, and
  # skipped results are ignored. The hook runs asynchronously after history
  # persistence and does not block calibration progress.
  ai_review_tasks:
    - CheckQubitSpectroscopy
    - CheckResonatorSpectroscopy
  ai_review_message: >-
    Review this calibration result and attach a concise operational
    review note. Auto-pass results that are good enough for routine parameter
    update. History consistency alone is not enough to accept visually
    unsupported output parameters, but weak f12 support by itself should usually
    become PASS_WITH_NOTE when f01 is clearly supported and no clearly stronger
    competing transition is visible. Do not escalate only because f12 is weak,
    anharmonicity is shallow, or nearby f01-like peaks have similar length and
    intensity when the marked f01 is still visibly supported and physically
    plausible; put that caveat in PASS_WITH_NOTE. Keep REVIEW for absent,
    off-marker, or clearly weaker f01 support, or when a clearly stronger
    competing f01 candidate would materially change the update.
  # Maximum conversation turns to maintain in context
  max_conversation_turns: 10
