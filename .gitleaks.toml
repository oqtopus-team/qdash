title = "QDash Gitleaks Configuration"

[extend]
  useDefault = true

[[allowlists]]
  description = "Generated artifacts and intentional sample credentials"
  paths = [
    '''\.devcontainer/requirements\.txt''',
    '''ui/bun\.lock''',
    '''docs/oas/openapi\.json''',
    '''ui/src/client/''',
    '''ui/src/schemas/''',
  ]
  regexTarget = "match"
  regexes = [
    '''mongodb://root:example@mongo:27017''',
  ]

[[allowlists]]
  description = "Documentation placeholder tokens and quantum gate fidelity metric names"
  regexTarget = "secret"
  regexes = [
    '''^ADMIN_TOKEN$''',
    '''^YOUR_TOKEN$''',
    '''^x90_gate_fidelity$''',
    '''^x180_gate_fidelity$''',
    '''^zx90_gate_fidelity$''',
  ]
