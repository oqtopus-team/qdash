services:
  mongo:
    ports:
      - "${MONGO_PORT:-27017}:27017"

  mongo-express:
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  prefect-server:
    ports:
      - "${PREFECT_PORT:-4200}:4200"

  deployment-service:
    ports:
      - "${DEPLOYMENT_SERVICE_PORT:-8001}:8001"

  api:
    ports:
      - "${API_PORT:-5715}:${API_PORT:-5715}"

  ui:
    ports:
      - "${UI_PORT:-5714}:${UI_PORT:-5714}"

  reverse-proxy:
    ports:
      - "${PROXY_PORT:-8080}:80"
